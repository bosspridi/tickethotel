<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TicketHotel – Enterprise Premium</title>

<style>
:root{
  --bg:#f3f4f6;
  --card:#ffffff;
  --sidebar:#ffffff;
  --border:#e5e7eb;
  --text:#111827;
  --muted:#6b7280;
  --primary:#4f46e5;
  --green:#22c55e;
  --yellow:#f59e0b;
  --blue:#3b82f6;
}

body.dark{
  --bg:#0f172a;
  --card:#111827;
  --sidebar:#0b1220;
  --border:#1f2937;
  --text:#e5e7eb;
  --muted:#9ca3af;
  --primary:#6366f1;
}

*{box-sizing:border-box;font-family:Inter,system-ui}
body{margin:0;background:var(--bg);color:var(--text);transition:.25s}

/* Pages */
.page{
  position:absolute;
  inset:0;
  display:flex;
  align-items:center;
  justify-content:center;
  transition:opacity .5s ease, transform .5s ease;
}

/* Animations */
.fade-in-slide{opacity:0; transform:translateY(20px); animation:fadeInSlide 0.7s forwards;}
@keyframes fadeInSlide{to{opacity:1; transform:translateY(0);}}
.fade-out-slide{opacity:1; transform:translateY(0); animation:fadeOutSlide 0.5s forwards;}
@keyframes fadeOutSlide{to{opacity:0; transform:translateY(-20px);}}

.hero{
  text-align:center;
  max-width:600px;
  background:var(--card);
  padding:50px;
  border-radius:20px;
  border:1px solid var(--border);
  box-shadow:0 20px 40px rgba(0,0,0,.05);
}
.hero h1{font-size:36px; margin-bottom:15px;}
.hero p{color:var(--muted); margin-bottom:25px;}

.app{display:flex;height:100vh}
.sidebar{
  width:240px;
  background:var(--sidebar);
  border-right:1px solid var(--border);
  display:flex; flex-direction:column; padding:20px 0;
}
.logo{font-weight:600;font-size:18px;padding:0 20px 20px;}
.nav-item{padding:12px 20px;cursor:pointer;color:var(--muted);transition:.2s;}
.nav-item:hover{color:var(--text);background:rgba(0,0,0,0.03);}
.nav-item.active{color:var(--text);border-left:3px solid var(--primary);}
.main{flex:1;display:flex;flex-direction:column;}
.header{height:60px;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center;padding:0 25px;}
.avatar{width:34px;height:34px;border-radius:50%;background:var(--primary);display:flex;align-items:center;justify-content:center;font-weight:bold;color:white;cursor:pointer;}
.content{padding:25px;overflow:auto;}

@keyframes fadeDashboard{from{opacity:0; transform:translateY(20px);} to{opacity:1; transform:translateY(0);}}
.kpis{display:flex;gap:20px;margin-bottom:25px;}
.kpi{flex:1;background:var(--card);border:1px solid var(--border);padding:18px;border-radius:12px;transition:.3s;opacity:0;transform:translateY(20px);}
.kpi.show{animation:fadeDashboard 0.5s forwards;}
.kpi:hover{transform:translateY(-3px);}
.kpi h3{margin:0;font-size:24px;}

.card{background:var(--card);border:1px solid var(--border);border-radius:12px;overflow:hidden;}
table{width:100%;border-collapse:collapse;}
th,td{padding:14px;text-align:left;border-bottom:1px solid var(--border);}
th{font-size:12px;text-transform:uppercase;color:var(--muted);}
tr:hover{background:rgba(0,0,0,0.03);}

.status{font-size:12px;padding:4px 10px;border-radius:20px;display:inline-block;}
.pending{background:rgba(245,158,11,.15);color:var(--yellow);}
.assigned{background:rgba(59,130,246,.15);color:var(--blue);}
.resolved{background:rgba(34,197,94,.15);color:var(--green);}

.btn{padding:6px 12px;border-radius:6px;border:none;cursor:pointer;font-size:12px;transition:.2s;}
.btn-primary{background:var(--primary);color:white;}
.btn-primary:hover{opacity:.85;}

input,select{padding:8px 10px;border-radius:6px;border:1px solid var(--border);background:var(--card);color:var(--text);}

.modal{position:fixed;inset:0;background:rgba(0,0,0,.5);display:flex;align-items:center;justify-content:center;opacity:0;pointer-events:none;transition:.25s;}
.modal.show{opacity:1;pointer-events:auto;}
.modal-content{background:var(--card);padding:25px;border-radius:12px;width:320px;}

.notify{position:fixed;right:20px;bottom:20px;background:var(--primary);color:white;padding:12px 18px;border-radius:8px;opacity:0;transform:translateY(10px);transition:.3s;}
.notify.show{opacity:1;transform:translateY(0);}
</style>
</head>
<body>

<!-- Landing Page -->
<div id="landingPage" class="page fade-in-slide">
  <div class="hero">
    <h1>TicketHotel</h1>
    <p>La plateforme SaaS de gestion de tickets dédiée aux hôtels modernes.</p>
    <button class="btn btn-primary" onclick="goToLogin()">Accéder à la plateforme</button>
  </div>
</div>

<!-- Login -->
<div id="loginPage" class="page" style="display:none;">
  <div class="card" style="width:350px;padding:30px;">
    <h2>Connexion TicketHotel</h2>
    <input id="loginName" placeholder="Votre nom"><br><br>
    <input type="password" id="loginPassword" placeholder="Mot de passe"><br><br>
    <select id="roleSelect">
      <option value="client">Client Hôtel</option>
      <option value="technician">Technicien</option>
      <option value="admin">Administrateur Hôtel</option>
      <option value="superadmin">Super Administrateur SaaS</option>
    </select><br><br>
    <select id="hotelSelect"></select><br><br>
    <button class="btn btn-primary" style="width:100%" onclick="login()">Se connecter</button>
  </div>
</div>

<!-- App -->
<div class="app" id="app" style="display:none;">
  <div class="sidebar" id="sidebar"></div>
  <div class="main">
    <div class="header">
      <div id="welcomeText"></div>
      <div style="display:flex;gap:15px;align-items:center">
        <span onclick="toggleTheme()" style="cursor:pointer;color:var(--muted)">Thème</span>
        <div class="avatar"></div>
      </div>
    </div>
    <div class="content" id="content"></div>
  </div>
</div>

<div class="modal" id="modal">
  <div class="modal-content">
    <h4>Assigner un technicien</h4>
    <select id="techSelect"></select>
    <br><br>
    <button class="btn btn-primary" onclick="confirmAssign()">Confirmer</button>
  </div>
</div>

<div class="notify" id="notify"></div>

<script>
/* ================== Données ================== */
let tickets=[
{id:"TK-001",title:"Wifi HS",client:"Karim",tech:"-",status:"pending",hotel:"Hotel A"},
{id:"TK-002",title:"Clim HS",client:"Sarah",tech:"Paul",status:"assigned",hotel:"Hotel A"},
{id:"TK-003",title:"TV noir",client:"Karim",tech:"Marc",status:"resolved",hotel:"Hotel B"}
];
let technicians=["Paul","Marc","Luc"];
let clients=["Karim","Sarah"];
let hotels=[
  {name:"Hotel A", plan:"Premium", admin:"Alice"},
  {name:"Hotel B", plan:"Standard", admin:"Bob"}
];
let plans=[{name:"Standard"},{name:"Premium"},{name:"Enterprise"}];
let currentUser=null;
let currentAssignIndex=null;

/* ================== Remplissage select hôtel ================== */
function populateHotelSelect(){
  const select = document.getElementById("hotelSelect");
  if(!select) return;
  select.innerHTML = "";
  hotels.forEach(h=>{
    select.innerHTML += `<option value="${h.name}">${h.name}</option>`;
  });
}

/* ================== Navigation ================== */
function goToLogin(){
  const landing = document.getElementById("landingPage");
  landing.classList.add("fade-out-slide");
  setTimeout(()=>{
    landing.style.display="none";
    const login = document.getElementById("loginPage");
    login.style.display="flex";
    login.classList.add("fade-in-slide");
    populateHotelSelect();
  },500);
}

function login(){
  currentUser={
    name:loginName.value||"Utilisateur",
    role:roleSelect.value,
    hotel:hotelSelect.value
  };
  loginPage.style.display="none";
  app.style.display="flex";
  setupInterface();
  notify("Connexion réussie");
}

function logout(){
  app.style.display="none";
  loginPage.style.display="flex";
  populateHotelSelect();
}

/* ================== Interface ================== */
function setupInterface(){
  let roleLabel={
    client:"Client Hôtel",
    technician:"Technicien",
    admin:"Administrateur Hôtel",
    superadmin:"Super Administrateur SaaS"
  };
  welcomeText.innerText=`Bonjour ${currentUser.name} - ${currentUser.hotel} (${roleLabel[currentUser.role]})`;
  document.querySelector(".avatar").innerText=currentUser.name.charAt(0).toUpperCase();

  let menu=`<div class="logo">TicketHotel</div>
  <div class="nav-item" onclick="renderDashboard()">Tableau de bord</div>`;
  if(currentUser.role=="client") menu+=`<div class="nav-item" onclick="renderCreateTicket()">Créer un ticket</div>`;
  if(currentUser.role=="admin"){
    menu+=`
    <div class="nav-item" onclick="renderManageTechnicians()">Gestion techniciens</div>
    <div class="nav-item" onclick="renderManageClients()">Gestion clients</div>
    <div class="nav-item" onclick="renderReports()">Rapports internes</div>
    <div class="nav-item" onclick="renderBilling()">Abonnements / Paiements</div>`;
  }
  if(currentUser.role=="superadmin"){
    menu+=`<div class="nav-item" onclick="renderManageHotels()">Gestion hôtels</div>`;
  }
  menu+=`<div class="nav-item" onclick="logout()">Déconnexion</div>`;
  sidebar.innerHTML=menu;

  renderDashboard();
}

/* ================== Tickets ================== */
function getVisibleTickets(){
  if(currentUser.role=="superadmin") return tickets;
  if(currentUser.role=="admin") return tickets.filter(t=>t.hotel==currentUser.hotel);
  if(currentUser.role=="technician") return tickets.filter(t=>t.hotel==currentUser.hotel && t.tech==currentUser.name);
  if(currentUser.role=="client") return tickets.filter(t=>t.hotel==currentUser.hotel && t.client==currentUser.name);
  return [];
}

function renderDashboard(){
  let visibleTickets=getVisibleTickets();
  let kpis=`
  <div class="kpis">
    <div class="kpi"><h3>${visibleTickets.length}</h3>Total</div>
    <div class="kpi"><h3>${visibleTickets.filter(t=>t.status=="pending").length}</h3>En attente</div>
    <div class="kpi"><h3>${visibleTickets.filter(t=>t.status=="assigned").length}</h3>Assignés</div>
    <div class="kpi"><h3>${visibleTickets.filter(t=>t.status=="resolved").length}</h3>Résolus</div>
  </div>`;
  content.innerHTML=kpis+`<div style="display:flex;justify-content:space-between;margin-bottom:15px;gap:15px">
  <input placeholder="Rechercher un ticket..." oninput="filterTickets(this.value)">
  <select onchange="filterStatus(this.value)">
    <option value="">Tous les statuts</option>
    <option value="pending">En attente</option>
    <option value="assigned">Assigné</option>
    <option value="resolved">Résolu</option>
  </select>
  </div>
  <div class="card">
  <table>
  <thead>
  <tr>
    <th>ID</th>
    <th>Titre</th>
    <th>Client</th>
    <th>Technicien</th>
    <th>Statut</th>
    <th>Action</th>
  </tr>
  </thead>
  <tbody id="tbody"></tbody>
  </table>
  </div>`;
  document.querySelectorAll(".kpi").forEach((kpi,i)=>setTimeout(()=>kpi.classList.add("show"), i*150));
  renderTable(visibleTickets);
}

function translateStatus(status){
  if(status=="pending") return "En attente";
  if(status=="assigned") return "Assigné";
  if(status=="resolved") return "Résolu";
  return status;
}

function renderTable(data){
  let rows="";
  data.forEach(t=>{
    let action="-";
    if(currentUser.role=="admin"||currentUser.role=="superadmin"){
      action=`<button class="btn btn-primary" onclick="openAssign(${tickets.indexOf(t)})">Assigner</button>`;
    }
    if(currentUser.role=="technician" && t.status=="assigned"){
      action=`<button class="btn btn-primary" onclick="markResolved(${tickets.indexOf(t)})">Marquer résolu</button>`;
    }
    rows+=`
    <tr>
      <td>${t.id}</td>
      <td>${t.title}</td>
      <td>${t.client}</td>
      <td>${t.tech}</td>
      <td><span class="status ${t.status}">${translateStatus(t.status)}</span></td>
      <td>${action}</td>
    </tr>`;
  });
  document.getElementById("tbody").innerHTML=rows;
}

function filterTickets(value){
  value=value.toLowerCase();
  renderTable(getVisibleTickets().filter(t=>t.title.toLowerCase().includes(value)));
}
function filterStatus(status){
  let visible=getVisibleTickets();
  renderTable(status? visible.filter(t=>t.status==status):visible);
}

function renderCreateTicket(){
  content.innerHTML=`
  <div class="card" style="padding:20px">
  <h3>Nouveau ticket</h3>
  <input id="newTitle" placeholder="Décrivez le problème"><br><br>
  <button class="btn btn-primary" onclick="createTicket()">Créer</button>
  </div>`;
}
function createTicket(){
  let id="TK-"+(tickets.length+1).toString().padStart(3,"0");
  tickets.push({id, title:newTitle.value, client:currentUser.name, tech:"-", status:"pending", hotel:currentUser.hotel});
  notify("Ticket créé");
  renderDashboard();
}

/* Assignation technicien */
function openAssign(i){
  currentAssignIndex=i;
  let select=document.getElementById("techSelect");
  select.innerHTML="";
  technicians.forEach(t=>{select.innerHTML+=`<option>${t}</option>`;});
  modal.classList.add("show");
}
function confirmAssign(){
  tickets[currentAssignIndex].tech=document.getElementById("techSelect").value;
  tickets[currentAssignIndex].status="assigned";
  modal.classList.remove("show");
  renderDashboard();
  notify("Technicien assigné");
}
function markResolved(i){
  tickets[i].status="resolved";
  renderDashboard();
  notify("Ticket marqué résolu");
}

/* Notifications et thème */
function notify(msg){
  let n=document.getElementById("notify");
  n.innerText=msg;
  n.classList.add("show");
  setTimeout(()=>n.classList.remove("show"),2000);
}
function toggleTheme(){document.body.classList.toggle("dark");}

/* ================== Admin fonctions ================== */
// Gestion techniciens
function renderManageTechnicians(){
  content.innerHTML=`
  <div class="card" style="padding:20px">
    <h3>Gestion des techniciens</h3>
    <div style="display:flex;gap:10px;margin-bottom:15px">
      <input id="newTech" placeholder="Nom du technicien">
      <button class="btn btn-primary" onclick="addTechnician()">Ajouter</button>
    </div>
    <ul id="techList" style="margin-top:15px"></ul>
  </div>`;
  refreshTechList();
}
function refreshTechList(){
  const ul=document.getElementById("techList");
  ul.innerHTML="";
  technicians.forEach((t,i)=>{
    ul.innerHTML+=`
      <li style="display:flex;gap:10px;align-items:center;margin-bottom:5px">
        <input style="width:120px" value="${t}" onchange="updateTechnician(${i}, this.value)">
        <button class="btn" onclick="removeTechnician(${i})">❌</button>
      </li>`;
  });
}
function addTechnician(){
  const name=document.getElementById("newTech").value.trim();
  if(name && !technicians.includes(name)){
    technicians.push(name);
    document.getElementById("newTech").value="";
    notify(`Technicien "${name}" ajouté`);
    refreshTechList();
  }
}
function removeTechnician(index){
  const name = technicians[index];
  technicians.splice(index,1);
  notify(`Technicien "${name}" supprimé`);
  refreshTechList();
}
function updateTechnician(index,value){
  if(value.trim()==="") return notify("Nom vide non autorisé");
  technicians[index]=value.trim();
  notify(`Technicien mis à jour`);
}

// Gestion clients
function renderManageClients(){
  content.innerHTML=`
  <div class="card" style="padding:20px">
    <h3>Gestion des clients</h3>
    <div style="display:flex;gap:10px;margin-bottom:15px">
      <input id="newClient" placeholder="Nom du client">
      <button class="btn btn-primary" onclick="addClient()">Ajouter</button>
    </div>
    <ul id="clientList" style="margin-top:15px"></ul>
  </div>`;
  refreshClientList();
}
function refreshClientList(){
  const ul=document.getElementById("clientList");
  ul.innerHTML="";
  clients.forEach((c,i)=>{
    ul.innerHTML+=`
      <li style="display:flex;gap:10px;align-items:center;margin-bottom:5px">
        <input style="width:120px" value="${c}" onchange="updateClient(${i}, this.value)">
        <button class="btn" onclick="removeClient(${i})">❌</button>
      </li>`;
  });
}
function addClient(){
  const name=document.getElementById("newClient").value.trim();
  if(name && !clients.includes(name)){
    clients.push(name);
    document.getElementById("newClient").value="";
    notify(`Client "${name}" ajouté`);
    refreshClientList();
  }
}
function removeClient(index){
  const name = clients[index];
  clients.splice(index,1);
  notify(`Client "${name}" supprimé`);
  refreshClientList();
}
function updateClient(index,value){
  if(value.trim()==="") return notify("Nom vide non autorisé");
  clients[index]=value.trim();
  notify(`Client mis à jour`);
}

// Rapports internes
function renderReports(){
  const visibleTickets=getVisibleTickets();
  const total=visibleTickets.length;
  const pending=visibleTickets.filter(t=>t.status=="pending").length;
  const assigned=visibleTickets.filter(t=>t.status=="assigned").length;
  const resolved=visibleTickets.filter(t=>t.status=="resolved").length;

  content.innerHTML=`
  <div class="card" style="padding:20px">
    <h3>Rapports internes</h3>
    <p>Total tickets: ${total}</p>
    <p>En attente: ${pending}</p>
    <p>Assignés: ${assigned}</p>
    <p>Résolus: ${resolved}</p>
  </div>`;
}

// Abonnement / Paiements
function renderBilling(){
  content.innerHTML=`
  <div class="card" style="padding:20px">
    <h3>Abonnement et paiements</h3>
    <p>Type d’abonnement: Premium</p>
    <p>Prochaine facture: 01/03/2026</p>
    <p>Montant: 199€/mois</p>
    <button class="btn btn-primary">Mettre à jour l’abonnement</button>
  </div>`;
}

/* ================== Superadmin fonctions ================== */
function renderManageHotels(){
  content.innerHTML=`
    <div class="card" style="padding:20px">
      <h3>Gestion des hôtels</h3>
      <input id="newHotelName" placeholder="Nom de l'hôtel">
      <select id="newHotelPlan">${plans.map(p=>`<option>${p.name}</option>`).join('')}</select>
      <input id="newHotelAdmin" placeholder="Nom Admin">
      <button class="btn btn-primary" onclick="addHotel()">Ajouter Hôtel</button>
      <ul id="hotelList" style="margin-top:15px"></ul>
    </div>`;
  refreshHotelList();
}
function addHotel(){
  const name=document.getElementById("newHotelName").value.trim();
  const plan=document.getElementById("newHotelPlan").value;
  const admin=document.getElementById("newHotelAdmin").value.trim();
  if(name && plan && admin){
    hotels.push({name,plan,admin});
    document.getElementById("newHotelName").value="";
    document.getElementById("newHotelAdmin").value="";
    notify(`Hôtel "${name}" ajouté`);
    refreshHotelList();
    populateHotelSelect();
  } else notify("Remplissez tous les champs");
}
function removeHotel(name){
  hotels=hotels.filter(h=>h.name!==name);
  notify(`Hôtel "${name}" supprimé`);
  refreshHotelList();
  populateHotelSelect();
}
function refreshHotelList(){
  const ul=document.getElementById("hotelList");
  ul.innerHTML="";
  hotels.forEach((h,i)=>{
    ul.innerHTML+=`
      <li>
        <input style="width:120px" value="${h.name}" onchange="updateHotel(${i}, 'name', this.value)">
        <select onchange="updateHotel(${i}, 'plan', this.value)">
          ${plans.map(p=>`<option value="${p.name}" ${p.name===h.plan?'selected':''}>${p.name}</option>`).join('')}
        </select>
        <input style="width:100px" value="${h.admin}" onchange="updateHotel(${i}, 'admin', this.value)">
        <button class="btn" onclick="removeHotel('${h.name}')">❌</button>
      </li>`;
  });
}
function updateHotel(index, field, value){
  if(value.trim()==="") return notify("Champ vide non autorisé");
  hotels[index][field]=value.trim();
  notify(`Hôtel mis à jour`);
  populateHotelSelect();
}
</script>
</body>
</html>
